{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center;">Welcome Back</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" autocomplete="username" required>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <div style="display: flex; position: relative;">
                <input type="password" name="password" id="loginPassword" autocomplete="new-password" required style="padding-right: 40px;">
                <button type="button" onclick="togglePassword()" style="position: absolute; right: 5px; top: 10px; background: none; color: #333; padding: 5px; cursor: pointer;">👁️</button>
            </div>
        </div>
        
        <div class="form-group">
            <input type="checkbox" name="remember" id="remember">
            <label for="remember">Remember Me</label>
        </div>
        
        <button type="submit" style="width: 100%;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>.</p>
</div>

<script>
    function togglePassword() {
        const passInput = document.getElementById("loginPassword");
        if (passInput.type === "password") {
            passInput.type = "text";
        } else {
            passInput.type = "password";
        }
    }
</script>
{% endblock %}
